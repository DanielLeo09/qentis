<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issuer Dashboard — Qentis</title>  <link href="../../assets/css/issuer/dashboard.css" rel="stylesheet"/>
</head>
<body>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/layout.js"></script>
<script>
  Auth.guard('ISSUER');
  injectNavbar();
  injectSidebar('issuer', 'dashboard');
</script>

<main class="q-main">
  <div class="q-page-header">
    <h1>Dashboard</h1>
    <p>Overview of your registered items and recent activity</p>
  </div>

  <!-- Stat cards -->
  <div class="q-stat-grid">
    <div class="q-stat">
      <div class="q-stat-icon" style="background:rgba(240,192,64,.1)">📄</div>
      <div class="q-stat-value" id="stat-total">—</div>
      <div class="q-stat-label">Total items registered</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon" style="background:#D1FAE5">✓</div>
      <div class="q-stat-value" id="stat-verified">—</div>
      <div class="q-stat-label">Verified this month</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon" style="background:#FEE2E2">⚠</div>
      <div class="q-stat-value" id="stat-alerts">—</div>
      <div class="q-stat-label">Fraud alerts</div>
    </div>
    <div class="q-stat">
      <div class="q-stat-icon" style="background:#F0FDF4">⛓</div>
      <div class="q-stat-value" id="stat-blockchain">—</div>
      <div class="q-stat-label">Blockchain records</div>
    </div>
  </div>

  <!-- Recent items -->
  <div class="q-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="q-card-title" style="margin:0">Recent registrations</div>
      <a href="my-items.html" style="font-size:13px">View all →</a>
    </div>

    <div id="recent-items-loading" style="text-align:center;padding:32px;color:var(--q-text-muted)">
      <div class="q-spinner" style="margin:0 auto 12px"></div>
      <div>Loading items...</div>
    </div>

    <table class="q-table" id="recent-items-table" style="display:none">
      <thead>
        <tr>
          <th>Item</th>
          <th>Category</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="recent-items-body"></tbody>
    </table>

    <div id="recent-items-empty" style="display:none;text-align:center;padding:40px;color:var(--q-text-muted)">
      <div style="font-size:32px;margin-bottom:12px">📦</div>
      <p>No items registered yet.</p>
      <a href="register-item.html" class="btn-q-primary">Register your first item</a>
    </div>
  </div>
</main>

<script>
async function loadDashboard() {
  try {
    const res  = await qFetch(`${API.ITEMS}/items/?limit=5`);
    const data = await res.json();

    document.getElementById('stat-total').textContent = data.count ?? data.results?.length ?? 0;

    const tbody = document.getElementById('recent-items-body');
    document.getElementById('recent-items-loading').style.display = 'none';

    if (!data.results || data.results.length === 0) {
      document.getElementById('recent-items-empty').style.display = 'block';
      return;
    }

    document.getElementById('recent-items-table').style.display = 'table';
    tbody.innerHTML = data.results.map(item => `
      <tr>
        <td>
          <div style="font-weight:500">${item.name}</div>
          <div style="font-size:12px;color:var(--q-text-muted);font-family:var(--q-mono)">${formatHash(item.hash)}</div>
        </td>
        <td><span class="q-badge q-badge-active">${item.category}</span></td>
        <td style="font-size:13px;color:var(--q-text-muted)">${formatDate(item.created_at)}</td>
        <td><span class="q-badge q-badge-approved">Active</span></td>
        <td>
          <a href="my-items.html?id=${item.id}" style="font-size:13px">View</a>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('recent-items-loading').style.display = 'none';
    document.getElementById('recent-items-empty').style.display = 'block';
  }
}

loadDashboard();
</script>
</body>
</html>
